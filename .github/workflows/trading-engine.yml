name: Trading Engine (Free Cron)

# FREE alternative to Vercel Pro crons.
# GitHub Actions gives 2,000 min/month free (unlimited on public repos).
# Calls the Vercel API routes directly on a schedule.
#
# Setup: Go to GitHub repo → Settings → Secrets → Actions
# Add secret: CRON_SECRET = tradebot-cron-2026-secure
# Add secret: APP_URL     = https://trading-bot-hazel-one.vercel.app

on:
  schedule:
    # Morning scan: 9:15 AM ET = 13:15 UTC (Monday-Friday)
    - cron: '15 13 * * 1-5'

    # Midday scan: 12:00 PM ET = 16:00 UTC
    - cron: '0 16 * * 1-5'

    # Position monitor: every 15 min 9:30 AM – 3:30 PM ET = 13:30-19:30 UTC
    - cron: '30 13 * * 1-5'
    - cron: '45 13 * * 1-5'
    - cron: '0,15,30,45 14 * * 1-5'
    - cron: '0,15,30,45 15 * * 1-5'
    - cron: '0,15,30,45 16 * * 1-5'
    - cron: '0,15,30,45 17 * * 1-5'
    - cron: '0,15,30,45 18 * * 1-5'
    - cron: '0,15,30,45 19 * * 1-5'

    # Morning swing-exit check: 9:35 AM ET = 13:35 UTC
    - cron: '35 13 * * 1-5'

    # Pre-close swing-exit: 3:30 PM ET = 19:30 UTC
    - cron: '30 19 * * 1-5'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (scan/monitor/close)'
        required: true
        default: 'monitor'
        type: choice
        options: [scan, monitor, close]

jobs:
  market-scan:
    name: Market Scan (9:15 AM + 12 PM ET)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scan' || github.event.schedule == '15 13 * * 1-5' || github.event.schedule == '0 16 * * 1-5'
    steps:
      - name: Trigger Scan
        run: |
          echo "Triggering market scan..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/scan")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Warning: Non-200 response" >&2
          fi

  position-monitor:
    name: Position Monitor (every 15 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'monitor' || (github.event.schedule != '15 13 * * 1-5' && github.event.schedule != '0 16 * * 1-5' && github.event.schedule != '35 13 * * 1-5' && github.event.schedule != '30 19 * * 1-5')
    steps:
      - name: Monitor Positions
        run: |
          echo "Monitoring positions..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/monitor")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE | $BODY"

  swing-exit:
    name: Swing Exit Check (9:35 AM + 3:30 PM ET)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'close' || github.event.schedule == '35 13 * * 1-5' || github.event.schedule == '30 19 * * 1-5'
    steps:
      - name: Run Swing Exit
        run: |
          echo "Running swing exit check..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/close")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE | $BODY"
