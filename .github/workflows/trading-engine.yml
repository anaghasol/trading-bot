name: Trading Engine

# FREE cron (no Vercel Pro needed).
# GitHub Actions: 2,000 min/month free on private repos.
# At every 5 min × 6.5 hr × 22 days = ~1700 runs/month ← fits free tier.
#
# SETUP: GitHub repo → Settings → Secrets → Actions → New repository secret
# Add: CRON_SECRET = tradebot-cron-2026-secure
# Add: APP_URL     = https://trading-bot-hazel-one.vercel.app

on:
  schedule:
    # ── Every 5 min during market hours (9:30 AM – 4 PM ET = 13:30-20:00 UTC) ──
    - cron: '30,35,40,45,50,55 13 * * 1-5'   # 9:30-9:55 AM ET
    - cron: '*/5 14 * * 1-5'                   # 10:00-10:55 AM ET
    - cron: '*/5 15 * * 1-5'                   # 11:00-11:55 AM ET
    - cron: '*/5 16 * * 1-5'                   # 12:00-12:55 PM ET
    - cron: '*/5 17 * * 1-5'                   # 1:00-1:55 PM ET
    - cron: '*/5 18 * * 1-5'                   # 2:00-2:55 PM ET
    - cron: '*/5 19 * * 1-5'                   # 3:00-3:55 PM ET

    # ── Morning scan: 9:15 AM ET = 13:15 UTC ──
    - cron: '15 13 * * 1-5'

    # ── Midday scan: 12:00 PM ET = 16:00 UTC ──
    - cron: '0 16 * * 1-5'

    # ── Swing exit checks ──
    - cron: '35 13 * * 1-5'  # 9:35 AM ET morning review
    - cron: '30 19 * * 1-5'  # 3:30 PM ET pre-close review

  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'monitor'
        type: choice
        options: [scan, monitor, close]

jobs:
  # ── Morning and midday entry scans ─────────────────────────────────────────
  market-scan:
    name: Market Scan
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '15 13 * * 1-5' ||
      github.event.schedule == '0 16 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scan')
    steps:
      - name: Trigger AI Market Scan
        run: |
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/scan")
          echo "HTTP: $RESPONSE"
          cat /tmp/response.txt

  # ── Every 5 min position monitor (the engine heart) ────────────────────────
  position-monitor:
    name: Position Monitor (5 min)
    runs-on: ubuntu-latest
    if: |
      (github.event.schedule != '15 13 * * 1-5' &&
       github.event.schedule != '0 16 * * 1-5' &&
       github.event.schedule != '35 13 * * 1-5' &&
       github.event.schedule != '30 19 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'monitor')
    steps:
      - name: Monitor + Trailing Stop + Partial Exits
        run: |
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/monitor")
          echo "HTTP: $RESPONSE"
          cat /tmp/response.txt

  # ── Swing exit checks (morning target review + pre-close time-stop) ─────────
  swing-exit:
    name: Swing Exit Check
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '35 13 * * 1-5' ||
      github.event.schedule == '30 19 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'close')
    steps:
      - name: Morning or Pre-Close Swing Exit
        run: |
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/close")
          echo "HTTP: $RESPONSE"
          cat /tmp/response.txt
